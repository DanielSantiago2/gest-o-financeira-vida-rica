<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💙 Nós Dois & Eu</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="dark">

<header class="topo">
  <h1>💙 Nós Dois & Eu</h1>
  <p id="usuario-logado">Visitante</p>
  <small id="plano-usuario">GRÁTIS</small>

  <button id="btn-tema" class="mini-btn">🌙 / ☀️</button>
</header>

<!-- LOGIN -->
<section id="secao-login" class="box">
  <h2>Entrar</h2>

  <input type="email" id="email" placeholder="Seu e-mail">
  <input type="password" id="senha" placeholder="Sua senha">

  <button id="btn-ver-senha" class="secundario">👁 Ver senha</button>
  <button id="btn-login">Entrar</button>
  <button id="btn-cadastrar">Criar Conta</button>
  <button id="btn-google" class="google">Entrar com Google</button>
  <button id="btn-recuperar" class="secundario">Esqueci minha senha</button>
</section>

<!-- APP -->
<section id="secao-app" style="display:none;">

<!-- 🔥 MODO USUÁRIO -->
<div class="box">
  <h3>👤 Tipo de Uso</h3>

  <div class="grid2">
    <button id="btn-modo-solo">👤 Solteiro</button>
    <button id="btn-modo-casal">💙 Casal</button>
  </div>

  <small id="status-casal">Modo individual</small>
</div>

<!-- 💰 RESUMO -->
<div class="grid2">
  <div class="saldo-card">
    <small>Tenho em dinheiro</small>
    <h2>R$ <span id="dinheiro">0,00</span></h2>
  </div>

  <div class="saldo-card secundario-card">
    <small>Contas</small>
    <h2>R$ <span id="contas">0,00</span></h2>
  </div>
</div>

<div class="saldo-card destaque">
  <small>Falta pagar</small>
  <h2>R$ <span id="falta">0,00</span></h2>
</div>

<!-- 🔥 BOTÃO FREE -->
<div class="box">
  <button id="btn-sync">
    🔄 Atualizar Agora (Plano Grátis)
  </button>
</div>

<!-- ⚙️ AÇÕES -->
<div class="grid2">
  <button id="btn-upgrade">👑 Planos</button>
  <button id="btn-pdf">📄 Gerar Relatório</button>
</div>

<div class="grid2">
   <button id="btn-solteiro" class="secundario">👤 Modo Solteiro</button>
  <button id="btn-casal">💙 Ativar Casal</button>
  <button id="btn-sair" class="danger">Sair</button>
</div>

<!-- 💌 CASAL -->
<div class="box">
  <h3>💙 Área do Casal</h3>

  <input type="email" id="email-parceiro" placeholder="E-mail parceiro">
  <button id="btn-convidar">Enviar Convite</button>

  <input type="text" id="codigo-grupo" placeholder="Código do grupo">
  <button id="btn-entrar-grupo">Entrar</button>

  <small id="status-casal">Nenhum parceiro conectado</small>
</div>

<!-- ➕ TRANSAÇÃO -->
<div class="box">
  <h3>Nova Transação</h3>

  <input type="text" id="desc" placeholder="Descrição">
  <input type="number" id="valor" placeholder="Valor">
  <input type="date" id="vencimento">

  <div class="grid2">
    <label><input type="radio" name="tipo" value="despesa" checked> Gasto</label>
    <label><input type="radio" name="tipo" value="receita"> Ganho</label>
  </div>

  <select id="categoria"></select>

  <div class="grid2">
    <label><input type="checkbox" id="fixo"> Fixo</label>
    <label><input type="checkbox" id="parcelado"> Parcelado</label>
  </div>

  <label>
    <input type="checkbox" id="assinatura">
    📺 Assinatura mensal
  </label>

  <input type="number" id="parcelas" placeholder="Qtd parcelas">

  <button id="btn-salvar">Adicionar</button>
</div>

<!-- 🎯 METAS -->
<div class="box">
  <h3>🎯 Metas</h3>

  <select id="tipo-meta">
    <option>Viagem</option>
    <option>Casa</option>
    <option>Carro</option>
    <option>Reserva</option>
  </select>

  <input type="number" id="valor-meta" placeholder="Valor meta">
  <button id="btn-salvar-meta">Salvar</button>

  <div id="lista-metas"></div>
</div>

<!-- 🤖 IA -->
<div class="box">
  <h3>🤖 Inteligência Financeira</h3>
  <div id="dicas-financeiras"></div>
</div>

<!-- 📊 GRÁFICO -->
<div class="box">
  <h3>📊 Gráfico</h3>
  <canvas id="meuGrafico"></canvas>
</div>

<!-- 📺 ASSINATURAS -->
<div class="box">
  <h3>📺 Assinaturas</h3>

  <p>Total: R$ <span id="total-assinaturas">0,00</span></p>

  <div id="lista-assinaturas"></div>
</div>

<!-- 📋 LISTA -->
<div class="box">
  <h3>📋 Transações</h3>
  <div id="lista"></div>
</div>

</section>

<script type="module" src="app.js"></script>

</body>
</html>
