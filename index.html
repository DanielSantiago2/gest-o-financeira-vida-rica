<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Vida Rica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2>💰 Vida Rica</h2>

  <!-- LOGIN -->
  <div id="secao-login">
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <button id="btn-login">Entrar</button>
    <button id="btn-cadastrar" class="btn-secundario">Criar Conta</button>
  </div>

  <!-- APP -->
  <div id="secao-app" style="display:none">

    <!-- USUÁRIO -->
    <p id="usuario-logado" style="text-align:center; font-size:12px;"></p>

    <!-- RESUMO -->
    <div class="resumo">
      <h1>R$ <span id="total">0</span></h1>
      <p>Saldo atual</p>
    </div>

    <!-- AÇÕES -->
    <div style="display:flex; gap:10px;">
      <button id="btn-sair" class="btn-secundario">Sair</button>
      <button id="btn-pdf" class="btn-perigo">📄 Relatório</button>
    </div>

    <!-- NOVA TRANSAÇÃO -->
    <div class="section">

      <input type="text" id="desc" placeholder="Descrição">
      <input type="number" id="valor" placeholder="Valor">

      <!-- TIPO -->
      <div style="display:flex; justify-content:space-around; margin-top:10px;">
        <label><input type="radio" name="tipo" value="despesa" checked> 💸 Gasto</label>
        <label><input type="radio" name="tipo" value="receita"> 💰 Ganho</label>
      </div>

      <!-- CATEGORIA -->
      <div style="display:flex; gap:5px;">
        <select id="categoria"></select>
        <button id="btn-add-categoria" class="btn-azul">+</button>
      </div>

      <button id="btn-salvar">Adicionar</button>
    </div>

    <!-- FILTROS -->
    <div class="section">

      <h3>🔎 Filtros</h3>

      <input type="text" id="busca" placeholder="🔍 Buscar descrição...">

      <select id="filtro-categoria">
        <option value="">Todas categorias</option>
      </select>

      <select id="filtro-tipo">
        <option value="">Todos</option>
        <option value="receita">Receitas</option>
        <option value="despesa">Despesas</option>
      </select>

      <div style="display:flex; gap:5px; margin-top:10px;">
        <input type="month" id="filtro-mes">
        <button id="btn-filtrar" class="btn-azul">Filtrar</button>
        <button id="btn-limpar" class="btn-secundario">Limpar</button>
      </div>

    </div>

    <!-- GRÁFICO -->
    <div style="margin-top:20px;">
      <canvas id="meuGrafico" height="200"></canvas>
    </div>

    <!-- LISTA -->
    <div id="lista"></div>

  </div>

  <!-- LIBS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  
  <!-- SEU JS -->
  <script type="module" src="app.js"></script>

</body>
</html>
