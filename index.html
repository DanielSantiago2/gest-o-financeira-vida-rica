<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nós Dois & Eu</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<!-- TOPO -->
<header class="topo">
  <h1>💙 Nós Dois & Eu</h1>
  <p id="usuario-logado"></p>
</header>

<!-- LOGIN -->
<section id="secao-login" class="box">

  <h2>Entrar</h2>

  <input type="email" id="email" placeholder="Seu e-mail">
  <input type="password" id="senha" placeholder="Sua senha">

  <button id="btn-login">Entrar</button>
  <button id="btn-cadastrar">Criar Conta</button>
  <button id="btn-google" class="btn-google">Entrar com Google</button>
  <button id="btn-recuperar">Esqueci minha senha</button>

</section>

<!-- APP -->
<section id="secao-app" style="display:none;">

  <!-- MODO -->
  <div class="box">

    <h3>Modo do App</h3>

    <div class="grid2">
      <button id="btn-modo-solo">👤 Solteiro</button>
      <button id="btn-modo-casal">💙 Casal</button>
    </div>

    <div id="painel-casal" style="margin-top:15px; display:none;">

      <input type="email" id="email-parceiro" placeholder="E-mail do parceiro(a)">

      <button id="btn-convidar">Convidar Parceiro</button>

      <div class="status-casal">
        <small id="status-casal">Nenhum parceiro conectado</small>
      </div>

    </div>

  </div>

  <!-- SALDOS -->
  <div class="grid2">

    <div class="saldo-card">
      <small>Saldo atual</small>
      <h2>R$ <span id="total">0,00</span></h2>
    </div>

    <div class="saldo-card secundario-card">
      <small>Meu saldo</small>
      <h2>R$ <span id="meu-total">0,00</span></h2>
    </div>

  </div>

  <!-- AÇÕES -->
  <div class="grid2">
    <button id="btn-pdf">📄 Relatório</button>
    <button id="btn-sair" class="danger">Sair</button>
  </div>

  <!-- NOVA TRANSAÇÃO -->
  <div class="box">

    <h3>Nova Transação</h3>

    <input type="text" id="desc" placeholder="Descrição">
    <input type="number" id="valor" placeholder="Valor">

    <input type="date" id="vencimento">

    <div class="grid2">
      <label><input type="checkbox" id="fixo"> Fixo</label>
      <label><input type="checkbox" id="parcelado"> Parcelado</label>
    </div>

    <input type="number" id="parcelas" placeholder="Quantidade parcelas">

    <div class="grid2">
      <label><input type="radio" name="tipo" value="despesa" checked> Gasto</label>
      <label><input type="radio" name="tipo" value="receita"> Ganho</label>
    </div>

    <select id="categoria"></select>

    <button id="btn-salvar">Adicionar</button>

  </div>

  <!-- FILTROS -->
  <div class="box">

    <h3>Filtros</h3>

    <input type="text" id="busca" placeholder="Buscar descrição">

    <select id="filtro-categoria">
      <option value="">Todas categorias</option>
    </select>

    <select id="filtro-tipo">
      <option value="">Todos</option>
      <option value="receita">Receitas</option>
      <option value="despesa">Despesas</option>
    </select>

    <input type="month" id="filtro-mes">

    <div class="grid2">
      <button id="btn-filtrar">Filtrar</button>
      <button id="btn-limpar" class="secundario">Limpar</button>
    </div>

  </div>

  <!-- GRÁFICO -->
  <div class="box">
    <h3>Resumo</h3>
    <canvas id="meuGrafico"></canvas>
  </div>

  <!-- LISTA -->
  <div class="box">
    <h3>Transações</h3>
    <div id="lista"></div>
  </div>

  <!-- CONTAS -->
  <div class="box">
    <h3>Contas a Vencer</h3>
    <div id="lista-contas"></div>
  </div>

</section>

<script type="module" src="app.js"></script>

</body>
</html>
